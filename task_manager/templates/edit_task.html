{% extends 'base.html' %}
{% block content %}
<h2>Edit Task: {{ task.title }}</h2>

<div class="panel" style="margin-top: 20px; max-width: 600px;">
    <form action="{{ url_for('edit_task', id=task.id) }}" method="POST">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ task.title }}" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4">{{ task.description }}</textarea>
        </div>
        <div class="form-group">
            <label>Assign To</label>
            <select name="assigned_to" required>
                <option value="" disabled>Select User</option>
                {% for user in users %}
                <option value="{{ user.id }}" {% if task.assigned_to == user.id %}selected{% endif %}>{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select name="priority">
                <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="date" name="deadline" value="{{ task.deadline }}">
        </div>
        <div style="margin-top: 20px;">
            <button type="submit" class="btn">Update Task</button>
            <a href="{{ url_for('manage_tasks') }}" class="btn" style="background-color: #6B7280;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
