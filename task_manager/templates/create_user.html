{% extends 'base.html' %}
{% block content %}
<h2>Manage Users</h2>

<div class="panel" style="margin-top: 20px;">
    <h3>Create New User</h3>
    <form action="{{ url_for('create_user') }}" method="POST" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end;">
        <div class="form-group" style="margin-bottom: 0;">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>Role</label>
            <select name="role">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn">Create</button>
    </form>
</div>

<h3>All Users</h3>
<table style="margin-top: 15px;">
    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                {% if user.id != session.user_id %}
                <form action="{{ url_for('delete_user', id=user.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this user?');">
                    <button type="submit" class="btn btn-small btn-danger">Delete</button>
                </form>
                {% else %}
                <span class="badge" style="background:#E5E7EB; color:#374151;">Current User</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
